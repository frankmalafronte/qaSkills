name: Web E2E Tests (web-test-cloud)

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to test
        required: true
      instructions:
        description: Additional instructions (optional)
        required: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check collaborator permission
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
            echo "::error::@${{ github.actor }} does not have write access. Fork the repo and use your own ANTHROPIC_API_KEY to run this agent."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run web-test-cloud agent
        run: |
          claude --agent web-test-cloud --verbose --max-turns 50 \
            --output-format stream-json \
            -p "URL: ${{ github.event.inputs.url }} Instructions: ${{ github.event.inputs.instructions }}" \
            | tee /tmp/claude_output.jsonl \
            | jq -r --unbuffered '
                if .type == "assistant" then
                  .message.content[] |
                  if .type == "text" then .text
                  elif .type == "tool_use" then "[\(.name)] \(.input | tojson | .[0:120])"
                  else empty end
                elif .type == "user" then
                  .message.content[] |
                  if .type == "tool_result" then
                    if .is_error then "  → ERROR: \(.content // "" | .[0:200])"
                    else "  → \(.content // "" | if type == "string" then . else tojson end | .[0:200])"
                    end
                  else empty end
                else empty end
              ' 2>/dev/null || true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}

      - name: Report token usage
        if: always()
        run: |
          RESULT=$(jq -c 'select(.type == "result")' /tmp/claude_output.jsonl 2>/dev/null | tail -1)
          if [ -n "$RESULT" ]; then
            INPUT=$(echo "$RESULT" | jq -r '.usage.input_tokens // 0')
            OUTPUT=$(echo "$RESULT" | jq -r '.usage.output_tokens // 0')
          else
            INPUT=$(jq -r 'select(.type == "assistant") | .message.usage | ((.input_tokens // 0) + (.cache_read_input_tokens // 0) + (.cache_creation_input_tokens // 0))' /tmp/claude_output.jsonl 2>/dev/null | awk '{s+=$1} END {print s+0}')
            OUTPUT=$(jq -r 'select(.type == "assistant") | (.message.usage.output_tokens // 0)' /tmp/claude_output.jsonl 2>/dev/null | awk '{s+=$1} END {print s+0}')
          fi
          TOTAL=$((INPUT + OUTPUT))
          echo "## Token Usage" >> $GITHUB_STEP_SUMMARY
          echo "| | Tokens |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Input | $INPUT |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | $OUTPUT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
