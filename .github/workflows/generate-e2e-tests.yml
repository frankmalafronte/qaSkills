name: Generate E2E Tests

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      instructions:
        description: What to test (free-form)
        required: false

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - uses: anthropics/claude-code-action@beta
        with:
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          trigger_phrase: "/generate-tests"
          prompt: |
            Run the generate-e2e-tests sub-agent.
            Instructions: ${{ github.event.inputs.instructions }}

      - name: Upload generated tests as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-tests
          path: tests/e2e/
          if-no-files-found: ignore
